services:
  synapratings_www:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY}
        VITE_RECAPTCHA_ACTION: ${VITE_RECAPTCHA_ACTION}
    container_name: synapratings-www
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 5000
      APP_DOMAIN: www.synap-ratings.com
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n-https_default}"
      - "traefik.http.routers.synapratings-www.rule=Host(`www.synap-ratings.com`)"
      - "traefik.http.routers.synapratings-www.entrypoints=websecure"
      - "traefik.http.routers.synapratings-www.tls=true"
      - "traefik.http.routers.synapratings-www.tls.certresolver=${TRAEFIK_CERTRESOLVER:-myresolver}"
      - "traefik.http.services.synapratings-www.loadbalancer.server.port=5000"
    networks:
      - traefik_shared
networks:
  traefik_shared:
    external: true
    name: ${TRAEFIK_NETWORK:-n8n-https_default}
