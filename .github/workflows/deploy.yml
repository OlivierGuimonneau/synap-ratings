name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Deploy script
          ssh -i ~/.ssh/deploy_key $VPS_USER@$VPS_HOST << 'EOF'
          set -e
          
          echo "🚀 Starting deployment..."
          cd ${{ env.VPS_PATH }}
          
          # Pull latest code from main
          echo "📥 Pulling latest code..."
          git pull origin main
          
          # Export environment variables
          echo "🔧 Loading environment variables..."
          export $(cat .env | xargs)
          
          # Build Docker image
          echo "🏗️  Building Docker image..."
          docker compose -f deploy/docker-compose.synap-ratings.yml build --no-cache
          
          # Stop old container
          echo "⏹️  Stopping old container..."
          docker compose -f deploy/docker-compose.synap-ratings.yml down
          
          # Start new container
          echo "▶️  Starting new container..."
          docker compose -f deploy/docker-compose.synap-ratings.yml up -d
          
          # Verify deployment
          echo "✅ Waiting for service to be ready..."
          sleep 5
          
          # Check container status
          if docker compose -f deploy/docker-compose.synap-ratings.yml ps | grep -q "healthy\|Up"; then
            echo "✓ Deployment successful!"
          else
            echo "✗ Container is not running"
            docker compose -f deploy/docker-compose.synap-ratings.yml logs --tail 50
            exit 1
          fi
          EOF

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Check https://www.synap-ratings.com"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check GitHub Actions logs for details"
